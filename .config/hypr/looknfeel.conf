# ┃                                                                  ┃
# ┃      ZUSQII  -  H Y P R L A N D  C O N F I G                     ┃
# ┃                                                                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃      @ ; General                                                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	general {
	    gaps_in = 1
	    gaps_out = 3
	    border_size = 1

		col.active_border   = $primary
		col.inactive_border = $outline

	    resize_on_border = false
	    allow_tearing    = false
	    layout           = dwindle
	}

dwindle {
    preserve_split = true
}
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃      @ ; Decoration                                              ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	decoration {
	    rounding       = 10
	    rounding_power = 2

	    active_opacity   = 1.0
	    inactive_opacity = 0.8

	    shadow {
	        enabled      = true 
	    }

	    blur {
	        enabled           = true
	        size              = 3
	        passes            = 4
	        new_optimizations = true
	        ignore_opacity    = false
	    }
	}

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
