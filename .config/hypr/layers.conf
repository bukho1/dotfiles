# ┃      @ ; Waybar blur                                             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	layerrule {
	   name = waybar
	   blur = false
	   ignore_alpha = true
}

