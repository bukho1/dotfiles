# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	layerrule {
	    name = rofi
	    blur = false
	    ignore_alpha = true
}

