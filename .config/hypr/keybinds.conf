        Github = @zusqii

# ──────────────────────────────────────────────────────────────

# ── @ ; Keybindings ────────────────────────────────────────────

$mainMod = SUPER # Sets "Windows" key as main modifier

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Applications

	bind = $mainMod, Return, exec, $terminal
	bind = $mainMod, E, exec, $fileManager
	bind = $mainMod, SPACE, exec, $menu
	bind = $mainMod, W, exec, zen-browser
	bind = $mainMod, A, exec, $message
  bind = $mainMod, P, exec, spotify
	
	bind = $mainMod, Q, killactive,
	bind = $mainMod, M, exec, wlogout
	bind = $mainMod, L, exec, hyprlock
  bind = $mainMod, J, layoutmsg, togglesplit
 	bind = $mainMod, V, togglefloating,
  bind = SUPER, N, exec, swaync-client --close-latest
  bind = SUPER, F, exec, ~/.scripts/fullscreen_toggle.sh

	bind = SUPER CTRL, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png
	bind = $mainMod, D, exec, ~/.scripts/wallpick.sh
	bind = $mainMod ALT, D, exec, ~/.scripts/wallpicker.sh
	bind = $mainMod, B, exec, ~/.scripts/toggle.blur.sh
	bind = $mainMod ALT, A, exec, ~/.scripts/animation.switcher.sh
	bind = $mainMod, T, exec, ~/.scripts/theme.switcher.sh
	bind = $mainMod, H, exec, ~/.scripts/configs.sh

#cealestia keybinds:
       #bind = $mainMod, M, global, caelestia:session
       #bind = $mainMod, L, global, caelestia:lock
       #bind = $mainMod, D, global, caelestia:launcher
       #bind = $mainMod, N, global, caelestia:notifs
       #bind = $mainMod, E, global, caelestia:dashboard 

	bind = SUPER ALT, 9, exec, ~/.scripts/toggle_waybar.sh
	bind = SUPER ALT, 8, exec, ~/user_scripts/wayclick/dusky_wayclick.sh
	#bind = ALT, 1, exec, spotify
  binde = , XF86AudioRaiseVolume,   exec, swayosd-client --output-volume raise
  binde = , XF86AudioLowerVolume,   exec, swayosd-client --output-volume lower
  bind = , XF86AudioMute, exec, ~/.scripts/audio-mute-toggle.sh
  bind = , XF86AudioMicMute, exec, ~/.scripts/mic-toggle.sh
  binde = , XF86MonBrightnessUp,    exec, swayosd-client --brightness raise
  binde = , XF86MonBrightnessDown,  exec, swayosd-client --brightness lower

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Workspaces

	bind = $mainMod, left, movefocus, l
	bind = $mainMod, right, movefocus, r
	bind = $mainMod, up, movefocus, u
	bind = $mainMod, down, movefocus, d

	bind = $mainMod, 1, workspace, 1
	bind = $mainMod, 2, workspace, 2
	bind = $mainMod, 3, workspace, 3
	bind = $mainMod, 4, workspace, 4
	bind = $mainMod, 5, workspace, 5
	bind = $mainMod, 6, workspace, 6
	bind = $mainMod, 7, workspace, 7
	bind = $mainMod, 8, workspace, 8
	bind = $mainMod, 9, workspace, 9
	bind = $mainMod, 0, workspace, 10

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Move Workspaces

	bind = $mainMod SHIFT, 1, movetoworkspace, 1
	bind = $mainMod SHIFT, 2, movetoworkspace, 2
	bind = $mainMod SHIFT, 3, movetoworkspace, 3
	bind = $mainMod SHIFT, 4, movetoworkspace, 4
	bind = $mainMod SHIFT, 5, movetoworkspace, 5
	bind = $mainMod SHIFT, 6, movetoworkspace, 6
	bind = $mainMod SHIFT, 7, movetoworkspace, 7
	bind = $mainMod SHIFT, 8, movetoworkspace, 8
	bind = $mainMod SHIFT, 9, movetoworkspace, 9
	bind = $mainMod SHIFT, 0, movetoworkspace, 10

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Scratchpads

	bind = $mainMod, S, togglespecialworkspace, magic
	bind = $mainMod SHIFT, S, movetoworkspace, special:magic

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Scroll through existing workspaces

	bind = $mainMod, mouse_down, workspace, e+1
	bind = $mainMod, mouse_up, workspace, e-1

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Move/resize

	bindm = $mainMod, mouse:272, movewindow
	bindm = $mainMod, mouse:273, resizewindow

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Laptop multimedia keys for volume and LCD brightness

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Requires playerctl

	bindl = , XF86AudioNext, exec, playerctl next
	bindl = , XF86AudioPause, exec, playerctl play-pause
	bindl = , XF86AudioPlay, exec, playerctl play-pause
	bindl = , XF86AudioPrev, exec, playerctl previous

#  ─────────────────────────────────────────────────────────────────────────────
