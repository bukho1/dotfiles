# ┃	 @ ; Environment                                             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━o━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛ 
  env = ELECTRON_OZONE_PLATFORM_HINT,auto
  env = MOZ_ENABLE_WAYLAND,1 exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
  env = GDK_SCALE,1 
  env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
  env = GTK_THEME,adw-gtk3-dark:dark
  env = QT_QPA_PLATFORMTHEME,qt6ct
  env = QT_QPA_PLATFORM,wayland
  env = XCURSOR_THEME,Bibata-Modern-Classic
  env = XCURSOR_SIZE,24
  env = HYPRCURSOR_SIZE,24
  exec-once = hyprctl setcursor Bibata-Modern-Classic 24
  exec-once = wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 1 && sleep 0.2 && echo 1 > /sys/class/leds/platform::micmute/brightness
        cursor {
          no_hardware_cursors = false
        }
