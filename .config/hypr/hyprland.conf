# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	$configDir = ~/.config/hypr
	monitor = , preferred, auto, 1

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	source = $configDir/environment.conf
	source = $configDir/programs.conf
	source = $configDir/input.conf
	source = ~/.config/hypr/colors.conf
	source = $configDir/looknfeel.conf
	source = $configDir/layers.conf
	source = $configDir/animations/current_animations.conf
	source = $configDir/windowrule.conf
	source = $configDir/keybinds.conf

        # Trigger hyprlock immediately when the lid switch is closed
        bindl = , switch:on:Lid Switch, exec, hyprlock
        exec-once = hypridle
        exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
decoration{
  screen_shader =
}

# HyprMod managed settings
source = /home/new/.config/hypr/hyprland-gui.conf
